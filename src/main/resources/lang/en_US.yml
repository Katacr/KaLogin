  code-not-sent: "&cPlease enter an email and send the code first."
  code-expired: "&cThe verification code has expired. Please send a new one."
  code-invalid: "&cInvalid verification code."
  bind-success: "&aEmail bound successfully: &e{email}"
  unbind-code-sent: "&aUnbind verification code sent to &e{email}&a."
