# KaLogin English Language File
# Supports color codes: &c(red), &a(green), &b(cyan), &d(pink), &e(yellow), &f(white), &l(bold), &o(italic), &n(underline), &m(strikethrough), &r(reset)
# Also supports MiniMessage format: <red>, <green>, <bold> etc.

# Command related
command:
  no-permission: "&cYou don't have permission to use this command!"
  unknown-subcommand: "&cUnknown subcommand! Use /kl help for help"
  reset-terms:
    usage: "&cUsage: /kl resetterms <player|all>"
    player-not-found: "&cPlayer not found: {player}"
    success: "&aReset terms acceptance state for player &e{player}"
    failed: "&cFailed to reset terms acceptance state for player &e{player}"
    all-success: "&aReset terms acceptance state for all players, affected &e{count} &arecords"
  delete:
    usage: "&cUsage: /kl delete <player>"
    player-not-found: "&cPlayer not found: {player}"
    success: "&aSuccessfully deleted &e{player}'s &adata"
    failed: "&cDeletion failed, player may not have registered data"
    kicked: "&cYour account has been deleted by an administrator. Please register again"
  register:
    usage: "&cUsage: /kl register <player> <password>"
    validation-failed: "&cPassword validation failed: {error}"
    success: "&aSuccessfully set password for player &e{player}"
    failed: "&cSetup failed, player may not have registered data"
  reload:
    success: "&aConfiguration reloaded"

# Login related
login:
  auto-login-success: "&aIP verified, auto-login successful!"
  success: "&aLogin successful! Welcome back!"
  verifying: "&eVerifying password..."
  password-empty: "&cPassword cannot be empty!"
  password-wrong: "&cPassword incorrect, please try again. Attempts remaining: &e{attempts}"
  too-many-attempts: "&cToo many failed login attempts, you have been kicked!"
  timeout-kick: "&cLogin timeout, please complete login within &e{seconds} &cseconds!"
  dialog-title: "Player Login"
  dialog-description: "Please enter your password: (Attempts remaining: {attempts})"
  dialog-button: "Login"
  recover-entry: "<text=' &b[Forgot password]';hover='Click to open password recovery';command='/recoverpassword'>"
  auto-login-checkbox: "Auto-login with same IP"
  password-input: "Please enter your password:"

# Registration related
register:
  welcome: "&aWelcome to the server! &ePlease complete registration within {seconds} seconds"
  timeout-kick: "&cRegistration timeout, please complete registration within &e{seconds} &cseconds!"
  password-empty: "&cPassword cannot be empty!"
  password-empty-retry: "&cPassword cannot be empty, please set again:"
  password-invalid: "&c{error}, please set again:"
  password-mismatch: "&cPasswords do not match, please start over."
  password-mismatch-retry: "&cPasswords do not match, please set password again:"
  saving: "&eSaving account..."
  success: "&aRegistration successful! You can start playing now."
  failed: "&cRegistration failed, please contact administrator."
  dialog-title: "New Player Registration"
  dialog-description: "{description}"
  dialog-button: "Complete Registration"
  password-input: "Please enter your password:"
  confirm-password-input: "Please enter your password again to confirm:"

# Change password related
change-password:
  old-password-empty: "&cOld password cannot be empty!"
  old-password-wrong: "&cOld password incorrect, please try again. Attempts remaining: &e{attempts}"
  old-password-input: "Please enter your old password:"
  new-password-empty: "&cNew password cannot be empty!"
  new-password-invalid: "&cNew password validation failed: {error}"
  new-password-input: "Please enter your new password:"
  confirm-new-password-input: "Please enter your new password again to confirm:"
  same-password: "&cNew password cannot be the same as old password!"
  password-mismatch: "&cNew passwords do not match, please set again."
  too-many-attempts: "&cToo many failed old password verification attempts!"
  saving: "&eSaving new password..."
  success: "&aPassword changed successfully!"
  failed: "&cPassword change failed, please contact administrator."
  dialog-title: "Change Password"
  dialog-button: "Confirm Change"
  cancel-button: "Cancel"

# IP limit related
ip-limit:
  exceeded: "&cThis IP has reached the maximum account registration limit (&e{count} &caccounts)!"

# Password validation related
password-validation:
  too-short: "&cPassword cannot be shorter than &e{min} &ccharacters"
  too-long: "&cPassword cannot be longer than &e{max} &ccharacters"
  invalid-chars: "&cPassword contains illegal characters, only letters, numbers and English symbols are allowed"
  in-blacklist: "&cPassword contains prohibited string: &e{word}"
  missing-uppercase: "&cPassword must contain at least one uppercase letter"
  missing-lowercase: "&cPassword must contain at least one lowercase letter"
  missing-number: "&cPassword must contain at least one number"
  missing-symbol: "&cPassword must contain at least one symbol"
  too-many-same-digits: "&cPassword cannot have &e{max} &cconsecutive identical digits"

# Plugin related
plugin:
  enabled: "&aKaLogin plugin enabled!"
  disabled: "&aKaLogin plugin disabled!"
  update-available: "&e[KaLogin] &fNew version available: &a{latest}&f, current: &7{current}  &a[MineBBS] &8| &b[SpigotMC]"
  update-minebbs-hover: "&7Click to open MineBBS page"
  update-spigotmc-hover: "&7Click to open SpigotMC page"

