# KaLogin 配置文件

# 配置文件版本（请勿修改）
config-version: 8

# 语言设置: zh_CN (简体中文) 或 en_US (English)
language: "zh_CN"

# 是否使用 AuthMe 作为登录验证
use-AuthMe: true

# OP 玩家进入时检查 GitHub 上是否有新版本
check-update: true

database:

  # 存储类型: sqlite 或 mysql
  type: "sqlite"

  # 如果使用 mysql，请填写以下信息
  mysql:
    host: "localhost"
    port: 3306
    database: "kalogin"
    username: "root"
    password: "password"
    # 连接池参数（可选）
    params: "?useSSL=false&serverTimezone=UTC"

  # 如果使用 sqlite，数据库文件名
  sqlite:
    file_name: "data.db"

# 注册设置
settings:
  # 密码最小长度
  min-password-length: 6
  # 密码最大长度
  max-password-length: 20
  # 密码只能包含大小写字母、数字和英文符号
  password-regex: "^[a-zA-Z0-9!@#$%^&*()_+\\-=\\[\\]{};':\"\\\\|,.<>/?~`]+$"
  # 密码不能包含以下字符串
  password-blacklist:
    - "PASSWORD"
    - "password"
    - "123456"
    - "12345678"
  # 是否必须包含大写字母
  has-uppercase: false
  # 是否必须包含小写字母
  has-lowercase: false
  # 是否必须包含符号
  has-symbol: false
  # 是否必须包含数字
  has-number: false
  # 不允许连续 n 个相同的数字（0 表示不限制）
  max-consecutive-same-digits: 3

# 登录注册设置
login:
  # 注册超时时间（秒），超时后踢出玩家
  register-timeout: 90
  # 登录超时时间（秒），超时后踢出玩家
  login-timeout: 90
  # 登录密码错误最大次数，超过后踢出玩家
  max-login-attempts: 3
  # 每个 IP 最多注册的账号数量（0 表示不限制）
  max-accounts-per-ip: 3
  # 是否显示"同IP自动登录"勾选框（公网环境建议关闭）
  show-auto-login-checkbox: true
  # 进入服务器后延迟多少 tick 显示登录/注册界面（0 或负数表示不延迟）
  # 防止其他插件/网络延迟等特殊情况下无法正常弹出登录/注册界面
  dialog-delay-ticks: 1

# 修改密码设置
change-password:
  # 旧密码验证最大失败次数，超过后取消修改
  max-attempts: 3

# 输入框自定义属性
inputs:
  # 登录对话框
  login:
    login_password:
      width: 200              # 输入框宽度 (1-1024，200为默认宽度)
      height: 17              # 输入框高度 (1-512，17为默认高度，设为 -1 则禁用多行模式)
      labelVisible: true      # 是否显示文本
      initial: ''             # 输入框内的初始值

    auto_login_by_ip:
      initial: false          # 默认选中状态 (true/false)

  # 注册对话框
  register:
    reg_password:
      width: 200
      height: 17              # 设为 -1 则禁用多行模式
      labelVisible: true
      initial: ''

    reg_confirm_password:
      width: 200
      height: 17              # 设为 -1 则禁用多行模式
      labelVisible: true
      initial: ''

  # 修改密码对话框
  change-password:
    old_password:
      width: 200
      height: 17              # 设为 -1 则禁用多行模式
      labelVisible: true
      initial: ''

    new_password:
      width: 200
      height: 17              # 设为 -1 则禁用多行模式
      labelVisible: true
      initial: ''

    confirm_new_password:
      width: 200
      height: 17              # 设为 -1 则禁用多行模式
      labelVisible: true
      initial: ''

  bind-email:
    email:
      width: 240
      height: 17
      labelVisible: true
      initial: ''

    code:
      width: 160
      height: 17
      labelVisible: true
      initial: ''

  recover-password:
    code:
      width: 160
      height: 17
      labelVisible: true
      initial: ''

    new_password:
      width: 200
      height: 17
      labelVisible: true
      initial: ''

    confirm_new_password:
      width: 200
      height: 17
      labelVisible: true
      initial: ''

email-binding:
  enabled: true
  code-expire-seconds: 300
  smtp:
    host: "smtp.qq.com"
    port: 587
    auth: true
    starttls: true
    ssl: true
    username: "katacr@qq.com"
    password: "oroiqpcrzclibefj"
    from-email: "katacr@qq.com"
    from-name: "KaLogin"

events:
  login:
    - 'console: say 玩家%player_name%已登录!' # 控制台指令
    - 'wait: 20' # 等待 20 tick 后继续执行后续动作
    - 'command: spawn' # 玩家指令
  register:
    - 'console: say 玩家%player_name%已注册!' # 控制台指令
    - 'wait: 20' # 等待 20 tick 后继续执行后续动作
    - 'command: help' # 玩家指令